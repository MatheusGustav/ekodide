name: Android Build & Unit Tests

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  build-and-unit-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Valida o gradle-wrapper.jar (supply-chain)
        uses: gradle/actions/wrapper-validation@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android

      - name: Testes JVM (cifra byte-idêntica)
        run: ./gradlew testDebugUnitTest --stacktrace

      - name: Build do APK debug
        run: ./gradlew assembleDebug --stacktrace

      - name: Sobe o APK debug
        uses: actions/upload-artifact@v4
        with:
          name: ekodide-debug-apk
          path: android/app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Sobe relatórios de teste (se falhar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: android/app/build/reports/tests/
          if-no-files-found: ignore
