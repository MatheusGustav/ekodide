name: Android Instrumented Tests (Emulator)

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-instrumented.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-instrumented.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  instrumented-test:
    runs-on: ubuntu-latest        # runner free 2-vCPU TEM KVM (confirmado abr/2024)
    timeout-minutes: 25
    env:
      # O android-emulator-runner às vezes trava no desligamento do emulador
      # ("stop: Not implemented") e pendura o job. Mata na hora em vez de esperar.
      ANDROID_EMULATOR_WAIT_TIME_BEFORE_KILL: 0
    strategy:
      fail-fast: false
      matrix:
        api-level: [29]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4

      # PASSO CRÍTICO: libera o /dev/kvm pro usuário do runner (sem isso o emulador
      # cai pra emulação por software e estoura o timeout).
      - name: Habilita KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      - name: Cache do AVD
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Cria o AVD e gera o snapshot (só no cache-miss)
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          working-directory: android
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "snapshot do AVD gerado"

      - name: Roda os testes instrumentados
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          working-directory: android
          api-level: ${{ matrix.api-level }}
          target: default
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew connectedDebugAndroidTest --stacktrace

      - name: Sobe relatórios instrumentados (se falhar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api${{ matrix.api-level }}
          path: android/app/build/reports/androidTests/
          if-no-files-found: ignore
