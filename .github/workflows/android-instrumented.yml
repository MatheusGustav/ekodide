name: Android Instrumented Tests (Emulator)

on:
  push:
    paths:
      - 'android/**'
      - '.github/workflows/android-instrumented.yml'
  pull_request:
    paths:
      - 'android/**'
      - '.github/workflows/android-instrumented.yml'
  workflow_dispatch:

defaults:
  run:
    working-directory: android

jobs:
  instrumented-test:
    runs-on: ubuntu-latest        # runner free 2-vCPU TEM KVM (confirmado abr/2024)
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle (com cache)
        uses: gradle/actions/setup-gradle@v4

      # PASSO CRÍTICO: libera o /dev/kvm pro usuário do runner (sem isso o emulador
      # cai pra emulação por software e estoura o timeout).
      - name: Habilita KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
        working-directory: .

      # Cold boot (sem cache de AVD) é mais confiável aqui que bootar de snapshot, que
      # estava dando boot pela metade e travamento no desligamento. O script ainda MATA
      # o emulador no fim (pkill) — assim o teardown da action não tem o que pendurar
      # ("stop: Not implemented"), preservando o código de saída real dos testes.
      - name: Roda os testes no emulador
        uses: reactivecircus/android-emulator-runner@v2.37.0
        with:
          working-directory: android
          api-level: 29
          target: default
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # A action roda CADA LINHA do script como um sh -c separado (variáveis não
          # persistem entre linhas). Por isso vai tudo em UMA linha (scalar dobrado >-),
          # com ';' separando: roda os testes, guarda o código, mata o emulador via
          # 'adb emu kill' (limpo) e sai com o código real. NÃO usar pkill -f: o padrão
          # casaria a própria linha do script (que contém o nome do processo) e a mataria.
          script: >-
            ./gradlew connectedDebugAndroidTest --stacktrace;
            code=$?;
            adb -s emulator-5554 emu kill 2>/dev/null || true;
            exit $code

      - name: Sobe relatórios instrumentados (se falhar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: android/app/build/reports/androidTests/
          if-no-files-found: ignore
